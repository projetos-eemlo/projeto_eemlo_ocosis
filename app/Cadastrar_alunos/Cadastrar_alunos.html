<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Alunos</title>
    
    <link rel="stylesheet" href="Cadastrar_alunos.css?v=1">
</head>
<body>
    <div class="Header">
        <a href="../login_page/login.html">1.Login\Cadastro</a>
        <a href="../turmas_page/turmas.html">2.Nova Pesquisa e Turma</a>
        <a href="../cadastrar_alunos/cadastrar_alunos.html">3.Cadastrar alunos</a>
        <a href="../ocorrencias_page/ocorrencias.html">4.Nova Ocorrência</a>
        <a href="../perfil_aluno/perfil_aluno.html">5.Perfil do aluno</a>
    </div>
    
    <div class="main-controls">
        <button id="btn-upload" class="upload">Upload CSV</button>
        
        <input id="input-pesquisa" aria-label="Pesquisar nome" type="search" class="search" placeholder="Pesquisar nome">
        
        <select id="turmas" class="turmas" aria-label="Turmas">
            <option value="">Selecione uma Turma</option>
        </select>
    </div>
    
    <div class="alunos" id="container-alunos">
        <div class="aluno-header">
            
            <div class="header-left">
                <input type="checkbox" id="aluno-todos" name="aluno-todos">
                <label for="aluno-todos" id="label-todos">Selecionar Todos</label>
            </div>
            
            <div id="turma-selecionada-info" class="turma-info-badge"></div>
            
        </div>
        
        </div>

    <div class="botoes-inferiores">
        <button id="btn-cadastrar" class="btn-primary" disabled>Cadastrar</button>
        <button id="btn-editar" class="btn-secondary">Editar</button>
        <button id="btn-excluir" class="btn-danger" disabled>Excluir</button>
        <button id="btn-trocar-turma" class="btn-info" disabled>Trocar de Turma</button>
    </div>

    <div id="modal-periodo" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Selecione a Versão da Turma</h3>
            <p>Identificamos múltiplos registros. Qual o período correto?</p>
            <div class="opcoes-periodo" id="opcoes-periodo">
                </div>
            <button id="fechar-modal" class="btn-danger">Cancelar Seleção</button>
        </div>
    </div>
    <div id="modal-transferencia-filtros" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>Selecione a Nova Turma</h3>
            <p>Filtre as opções abaixo para encontrar a turma de destino.</p>
            
            <div class="filtros-cascata">
                <select id="filtro-ano" class="search" style="width: 100%; margin-bottom: 10px;">
                    <option value="">Selecione o Ano Letivo</option>
                </select>
                
                <select id="filtro-semestre" class="search" style="width: 100%; margin-bottom: 10px;">
                    <option value="">Selecione o Semestre (Opcional)</option>
                </select>
                
                <select id="filtro-trimestre" class="search" style="width: 100%; margin-bottom: 10px;">
                    <option value="">Selecione o Trimestre (Opcional)</option>
                </select>

                <select id="filtro-turma-destino" class="search" style="width: 100%; border-color: var(--color-primary);">
                    <option value="">Selecione a Turma de Destino</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="btn-cancelar-filtros" class="btn-secondary" style="flex: 1;">Cancelar</button>
                <button id="btn-avancar-transferencia" class="btn-primary" style="flex: 1;" disabled>Avançar</button>
            </div>
        </div>
    </div>

    <div id="modal-transferencia-confirmacao" class="modal-overlay hidden">
        <div class="modal-content" style="max-width: 500px;">
            <h3>Confirmar Transferência</h3>
            
            <div id="lista-alunos-transferencia" class="mini-lista-alunos">
                </div>
            
            <p id="texto-confirmacao-turma" style="margin-top: 15px; font-weight: bold; color: var(--color-text-dark);"></p>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="btn-cancelar-transferencia" class="btn-secondary" style="flex: 1;">Cancelar</button>
                <button id="btn-confirmar-transferencia" class="btn-primary" style="flex: 1;">Confirmar</button>
            </div>
        </div>
    </div>
    
    <script src="Cadastrar_alunos.js?v=2"></script>
</body>
</html>
