<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Usuarios</title>


    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/Nav.css">

</head>
<body>

    <nav>
        <a href="login.html">Login/ Cadastro</a>
        <a>Cadastro Usuário</a>
        <a>Nova Ocorrência</a>
        <a>Pesquise e Turmas</a>
        <a>Perfil do Aluno</a>
        </nav>
     <main>
        <div class="login-container">
            <h2>2. Cadastro de Usuário</h2>
            <h3> Cadastrar Funcionario </h3>
            <form action="#" method="POST">
                <label for="nome">Nome do funcionário</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>

                <label for="cargo">Cargo / Permissão </label>
                <select id="cargo" name="cargo" required>
                    <option value="">Selecione o cargo</option>
                    <option value="admin">Direção (Acesso Total)</option>
                    <option value="professor">Professor</option>
                    <option value="secretaria">Supervisor</option>
                    
                </select>

                 <div class="password-field" style="position: relative; width: 100%; max-width: 420px;">
                    <input type="password" id="password" name="password" placeholder="Digite sua senha" required style="width: 100%; padding: 10px 100px 10px 10px; font-size: 1rem; box-sizing: border-box;">
                    <button type="button" class="toggle-password" style="position: absolute; right: 4px; top: 20%; transform: translateY(-20%); height: calc(10% - 8px); padding: 0 12px; font-size: 0.9rem; border: none; background: #ddd; cursor: pointer;">Mostrar</button>
                </div>
                <button type="submit" class="btn-entrar">Cadastrar</button>
            </form>
        </div>
    </main>    

    <script src="JS/cadastro.js"></script>
</body>
</html>
