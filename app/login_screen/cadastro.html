<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Usuarios</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>

    <nav>
        <a href="index.html" >1.Login</a>
        <a>2.Cadastro Usuário</a>
        <a>3.Nova Ocorrência</a>
        <a>4.Pesquise e Turmas</a>

     <main>
        <div class="login-container">
            <h2>1. Cadastro de Usuário</h2>
            <h3> Cadastrar Funcionario </h3>
            <form action="#" method="POST">
                <label for="nome">Nome do funcionário</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo" required>

                <label for="email">Direção (Acesso Total)</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

                <label for="senha">Digite sua senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                <div class="button-group">
                <button type="submit" class="btn-entrar">Cadastrar</button>
               
                </div>
            </form>
        </div>
    </main>    

    <script src="JS/cadastro.js"></script>
</body>
</html>
