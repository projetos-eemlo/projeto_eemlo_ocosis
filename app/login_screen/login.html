<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <nav>
        <a>Login/ Cadastro</a>
        <a>Cadastro Usuário</a>
        <a>Nova Ocorrência</a>
        <a>Pesquise e Turmas</a>
        <a>Perfil do Aluno</a>
    </nav>

    <main>
        <div class="login-container">
            <h2>1. Acesso ao Sistema</h2>
            <h3>Entrar</h3>
            <form action="#" method="POST">
                <label for="username">E-mail ou Matricula:</label>
                <input type="text" id="username" name="username" placeholder="Digite seu e-mail " required>

                <label for="password">Senha:</label>
                <div class="password-field" style="position: relative; width: 100%; max-width: 420px;">
                    <input type="password" id="password" name="password" placeholder="Digite sua senha" required style="width: 100%; padding: 10px 100px 10px 10px; font-size: 1rem; box-sizing: border-box;">
                    <button type="button" class="toggle-password" style="position: absolute; right: 4px; top: 50%; transform: translateY(-50%); height: calc(100% - 8px); padding: 0 12px; font-size: 0.9rem; border: none; background: #ddd; cursor: pointer;">Mostrar</button>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-entrar">Entrar</button>
                    <a href="cadastro.html" class="btn-cadastro"> Solicitar Cadastro</a>
                </div>
            </form>
        </div>
    </main>    
    <script src="JS/login.js"></script>
</body>
</html>
