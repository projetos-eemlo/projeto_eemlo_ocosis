<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso ao Sistema</title>
    <link rel="stylesheet" href="CSS_login_screen/login.css">
    <style>
       
        #error-msg {
            display: none;
            color: red; 
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#">1. Login / Cadastro</a>
        <a href="#">2. Cadastro Usuario</a>
        <a href="#">3. Nova Ocorrência</a>
        <a href="#">4. Pesquisa e Turmas</a>
        <a href="#">5. Perfil do Aluno</a>
    </nav>

    <main class="container">
        <div class="login-card login-container">
            <h2>1. Acesso ao Sistema</h2>
            <hr class="divider">
            
            <h3 class="subtitle">Entrar</h3>
            <hr class="divider">

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">E-mail ou Matricula:</label>
                    <input type="text" id="email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha:</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Digite sua senha" required>
                        <button type="button" class="btn-show-password" onclick="togglePassword()">Mostrar</button>
                    </div>
                </div>

                <div class="error-message" id="error-msg">
                    Usuário ou senha incorretos.
                </div>

                <div class="actions button-group">
                    <button type="submit" class="btn-entrar">Entrar</button>
                    <button type="button" class="btn-cadastro">Solicitar Cadastro</button>
                </div>
            </form>
        </div>
    </main>

    <script>
       
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleButton = document.querySelector('.btn-show-password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleButton.textContent = 'Ocultar';
            } else {
                passwordInput.type = 'password';
                toggleButton.textContent = 'Mostrar';
            }
        }


        document.getElementById('loginForm').addEventListener('submit', function(event) {
            
            event.preventDefault(); 

           
            const emailCorreto = "usuario@gmail.com";
            const senhaCorreta = "123456";

     
            const emailDigitado = document.getElementById('email').value;
            const senhaDigitada = document.getElementById('password').value;
            const erroMensagem = document.getElementById('error-msg');

            // Validação
            if (emailDigitado === emailCorreto && senhaDigitada === senhaCorreta) {
                alert('Login efetuado com sucesso!');
                erroMensagem.style.display = 'none'; 
               
            } else {
            
                erroMensagem.style.display = 'block';
            }
        });
    </script>
</body>
</html>
