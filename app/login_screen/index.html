        <div class="login-container">
            <h2>1. Acesso ao Sistema</h2>
            <h3>Entrar</h3>
            <form action="login.php" method="POST">
                <label for="username">E-mail ou Matricula:</label>
                <input type="text" id="username" name="username" placeholder="Digite seu e-mail " required>

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" placeholder="Digite sua senha" required>

                <div class="button-group">
                    <button type="submit" class="btn-entrar">Entrar</button>
                    <button type="button" class="btn-cadastro">Solicitar Cadastro</button>
                </div>
            </form>
        </div>
