<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <style>
        /* --- Configurações Globais --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f7f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- Barra de Navegação Superior (Ativa no item 2) --- */
        .navbar {
            background-color: #2b7fff;
            width: 100%;
            max-width: 1000px;
            border-radius: 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 15px 10px;
            margin-bottom: 50px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .nav-item {
            color: #ffffff;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.2s;
            opacity: 0.7; /* Itens secundários levemente opacos */
        }

        /* Destaca a aba atual de cadastro */
        .nav-item.active {
            opacity: 1;
            border-bottom: 2px solid #ffffff;
            padding-bottom: 2px;
        }

        .nav-item:hover {
            opacity: 1;
        }

        /* --- Card do Formulário de Cadastro --- */
        .register-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .card-header h2 {
            font-size: 22px;
            color: #000000;
            margin-bottom: 12px;
        }

        .card-subtitle {
            font-size: 16px;
            font-weight: bold;
            color: #000000;
            padding-top: 12px;
            border-top: 1px solid #e0e0e0;
            margin-bottom: 15px;
        }

        /* --- Divisórias e Campos de Entrada --- */
        .form-group {
            margin-bottom: 18px;
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #a6a6a6;
            border-radius: 4px;
            font-size: 14px;
            color: #333333;
            outline: none;
        }

        .form-group input::placeholder {
            color: #a6a6a6;
        }

        /* --- Botões de Ação --- */
        .button-group {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Botão Cadastrar (Verde) */
        .btn-save {
            background-color: #1cc843;
            color: white;
            width: 55%;
        }

        .btn-save:hover {
            background-color: #17a637;
        }

        /* Botão Voltar (Cinza) */
        .btn-back {
            background-color: #adadb3;
            color: white;
            width: 40%;
        }

        .btn-back:hover {
            background-color: #96969c;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a class="nav-item">1. Login / Cadastro</a>
        <a class="nav-item active">2. Cadastro Usuario</a>
        <a class="nav-item">3. Nova Ocorrência</a>
        <a class="nav-item">4. Pesquisa e Turmas</a>
        <a class="nav-item">5. Perfil do Aluno</a>
    </nav>

    <main class="register-card">
        <div class="card-header">
            <h2>2. Cadastro Usuario</h2>
        </div>
        
        <div class="card-subtitle">Criar Nova Conta</div>

        <form>
            <div class="form-group">
                <label for="fullname">Nome Completo:</label>
                <input type="text" id="fullname" placeholder="Digite seu nome completo" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="Digite seu e-mail" required>
            </div>

            <div class="form-group">
                <label for="registration">Matrícula:</label>
                <input type="text" id="registration" placeholder="Digite sua matrícula" required>
            </div>

            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" placeholder="Crie uma senha" required>
            </div>

            <div class="button-group">
               <a href="index.html" class="btn btn-back" style="text-align: center; text-decoration: none; display: inline-block;">
    Voltar
</a>
                <button type="submit" class="btn btn-save">Cadastrar</button>
            </div>
        </form>
    </main>

</body>
</html>
